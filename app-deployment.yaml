apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker-app
  namespace: fitness-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness-tracker-app
  stratergy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: fitness-tracker-app
      annotations:
        ad.datadoghq.com/fitness-tracker-app.logs: >-
          [{"source":"nodejs","service":"fitness-tracker-service"},
           {"source":"nodejs","service":"fitness-tracker-app"}]
    spec:
      containers:
        - name: fitness-tracker-app
          image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest
          ports:
            - containerPort: 5000
          resources:
            requests: 
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          # ✔ All configMap vars removed
          # ✔ Direct env variables added
          env:
          #   - name: MONGODB_URI
          #     value: "mongodb://mongodb-service:27017/fitness-tracker"
          #   - name: PORT
          #     value: "5000"
          #   - name: HOST
          #     value: "0.0.0.0"
          #   - name: NODE_ENV
          #     value: "production"
            # Datadog APM (tracing) env variables
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                    name: fitness-configmap
                    key: MONGODB_URI
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: HOST
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: NODE_ENV
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_ENV
              value: "production"
            - name: DD_SERVICE
              value: "fitness-tracker-app"
            - name: DD_VERSION
              value: "1.0.0"
---

apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
  namespace: fitness-ns
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP